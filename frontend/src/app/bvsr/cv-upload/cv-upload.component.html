<app-navbar></app-navbar>

<section class="cv-upload-section">
  <div class="container">
    <h1 class="page-title">{{ 'cv.title' | translate }}</h1>
    <p class="subtitle">{{ 'cv.subtitle' | translate }}</p>

    <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()" class="upload-form">
      <mat-form-field appearance="outline" class="form-field full-width">
        <mat-label>{{ 'cv.email' | translate }}</mat-label>
        <input matInput type="email" formControlName="email" required>
        <mat-error *ngIf="uploadForm.get('email')?.hasError('required')">
          {{ 'cv.emailRequired' | translate }}
        </mat-error>
        <mat-error *ngIf="uploadForm.get('email')?.hasError('email')">
          {{ 'cv.emailInvalid' | translate }}
        </mat-error>
      </mat-form-field>

      <div class="file-upload">
        <input
          type="file"
          #fileInput
          id="cvFile"
          accept=".pdf,.doc,.docx"
          (change)="onFileSelected($event)"
          style="display: none;">
        <button mat-raised-button type="button" class="upload-button" (click)="fileInput.click()">
          <mat-icon>upload</mat-icon>
          {{ 'cv.chooseFile' | translate }}
        </button>
        <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
        <p class="file-hint">{{ 'cv.hint' | translate }}</p>
      </div>

      <div class="button-group">
        <button mat-raised-button type="submit" [disabled]="submitting || !selectedFile">
          <span *ngIf="!submitting">{{ 'cv.upload' | translate }}</span>
          <span *ngIf="submitting">{{ 'cv.uploading' | translate }}</span>
        </button>
      </div>

      <div *ngIf="successMsg" class="message success">
        {{ successMsg }}
      </div>
      <div *ngIf="errorMsg" class="message error">
        {{ errorMsg }}
      </div>
    </form>
  </div>
</section>

<app-footer></app-footer>
