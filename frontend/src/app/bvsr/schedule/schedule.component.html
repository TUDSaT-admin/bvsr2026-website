<app-navbar></app-navbar>

<div class="schedule-container" [class.day1]="activeDay === 1" [class.day2]="activeDay === 2" [class.day3]="activeDay === 3" [class.day4]="activeDay === 4">

  <div class="overlay overlay-day1" [style.opacity]="overlay1Opacity"></div>
  <div class="overlay overlay-day2" [style.opacity]="overlay2Opacity"></div>
  <div class="overlay overlay-day3" [style.opacity]="overlay3Opacity"></div>
  <div class="overlay overlay-day4" [style.opacity]="overlay4Opacity"></div>

  <div class="day-panel">
    <div class="day-list">
      @for (d of dayBlocks; track d.id) {
        <div class="day-item" [class.active]="activeDay === d.id" (click)="setDay(d.id)">
          <span class="day-item-date">{{ d.dateKey | translate }}</span>
          <span class="day-item-day">{{ d.weekdayKey | translate }}</span>
        </div>
      }
    </div>
  </div>

  <div class="content">
    @for (d of dayBlocks; track d.id) {
      <div class="schedule" [class.active]="activeDay === d.id">
        <h2>{{ d.headingKey | translate }}</h2>
        @for (s of d.sessions; track s.timeKey + s.titleKey) {
          <div class="session">
            <div class="time scramble-text">{{ s.timeKey | translate }}</div>
            <div class="title scramble-text">{{ s.titleKey | translate }}</div>
          </div>
        }
      </div>
    }
  </div>

</div>
