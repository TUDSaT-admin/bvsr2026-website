<app-navbar></app-navbar>

<section class="contact-section">
  <h1 class="constellation-title">{{ 'contact.title' | translate }}</h1>

  <div class="contact-container">
    <div class="contact-info">
      <h2>{{ 'contact.connectTitle' | translate }}</h2>
      <p>
        {{ 'contact.connectP' | translate }}
      </p>

      <div class="socials">
        <a href="https://www.youtube.com/@tudsat" target="_blank">
          <img src="assets/icons/youtube.svg" alt="YouTube" class="social-icon" />
        </a>
        <a href="https://www.instagram.com/tudsat_ev/?hl=en" target="_blank">
          <img src="assets/icons/instagram.svg" alt="Instagram" class="social-icon" />
        </a>
        <a href="https://www.linkedin.com/school/tu-darmstadt-space-technology-e-v/" target="_blank">
          <img src="assets/icons/linkedin.svg" alt="LinkedIn" class="social-icon" />
        </a>
        <a href="https://discord.gg/YsEQEa3N9a" target="_blank">
          <img src="assets/icons/discord.svg" alt="Discord" class="social-icon" />
        </a>
        <a href="mailto:vorstand@tudsat.space" target="_blank" rel="noopener noreferrer">
          <img src="assets/icons/mail.svg" alt="Gmail" class="social-icon" />
        </a>
      </div>
    </div>

    <div class="contact-form">
      <h2 class="yellow-title">{{ 'contact.formTitle' | translate }}</h2>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'contact.name' | translate }}</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'contact.email' | translate }}</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'contact.message' | translate }}</mat-label>
          <textarea matInput rows="3" formControlName="questions"></textarea>
        </mat-form-field>

        <div *ngIf="successMsg" style="color: lightgreen; margin: 8px 0;">
          {{ successMsg }}
        </div>
        <div *ngIf="errorMsg" style="color: red; margin: 8px 0;">
          {{ errorMsg }}
        </div>

        <button class="launch-btn" type="submit" [disabled]="submitting">
          {{ 'contact.submit' | translate }}
        </button>
      </form>
    </div>
  </div>
</section>

<app-footer></app-footer>
