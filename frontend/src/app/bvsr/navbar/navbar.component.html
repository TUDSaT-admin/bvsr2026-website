<mat-toolbar class="navbar">
  <div class="brand clickable" routerLink="/">
    <img src="../../assets/images/pictogramColor.png" alt="BVSR" class="brand-logo bvsrlogo">
    <span class="dash">|</span>
    <img src="../../assets/images/tudsatLogo.png" alt="TUdSat" class="brand-logo">
  </div>

  <span class="spacer"></span>

  <nav class="links desktop-links">
    <button mat-button class="link" routerLink="/about">{{ 'nav.about' | translate }}</button>
    <button mat-button class="link" routerLink="/schedule">{{ 'nav.schedule' | translate }}</button>
    <button mat-button class="link" routerLink="/speakers">{{ 'nav.speakersGuests' | translate }}</button>
    <button mat-button class="link" routerLink="/sponsers">{{ 'nav.sponsors' | translate }}</button>
    <button mat-button class="link" routerLink="/contact">{{ 'nav.contact' | translate }}</button>
    <button mat-button class="link" routerLink="/upload-cv">{{ 'nav.uploadCv' | translate }}</button>
    <button mat-button class="link" routerLink="/tour-registration">{{ 'nav.tourRegistration' | translate }}</button>
  </nav>

  <div class="lang-switch" role="group" [attr.aria-label]="'nav.language' | translate">
    <button type="button" class="lang-btn" [class.active]="i18n.lang() === 'en'" (click)="onLang('en')">EN</button>
    <button type="button" class="lang-btn" [class.active]="i18n.lang() === 'de'" (click)="onLang('de')">DE</button>
  </div>

  <button class="menu-icon" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="mobile-menu" [class.open]="menuOpen">
    <div class="mobile-lang" role="group" [attr.aria-label]="'nav.language' | translate">
      <button type="button" class="lang-btn" [class.active]="i18n.lang() === 'en'" (click)="onLang('en'); toggleMenu()">EN</button>
      <button type="button" class="lang-btn" [class.active]="i18n.lang() === 'de'" (click)="onLang('de'); toggleMenu()">DE</button>
    </div>

    <button mat-button class="link" routerLink="/about" (click)="toggleMenu()">{{ 'nav.about' | translate }}</button>
    <button mat-button class="link" routerLink="/schedule" (click)="toggleMenu()">{{ 'nav.schedule' | translate }}</button>
    <button mat-button class="link" routerLink="/speakers" (click)="toggleMenu()">{{ 'nav.speakersGuests' | translate }}</button>
    <button mat-button class="link" routerLink="/sponsers" (click)="toggleMenu()">{{ 'nav.sponsors' | translate }}</button>
    <button mat-button class="link" routerLink="/contact" (click)="toggleMenu()">{{ 'nav.contact' | translate }}</button>
    <button mat-button class="link" routerLink="/upload-cv" (click)="toggleMenu()">{{ 'nav.uploadCv' | translate }}</button>
    <button mat-button class="link" routerLink="/tour-registration" (click)="toggleMenu()">{{ 'nav.tourRegistration' | translate }}</button>
  </div>
</mat-toolbar>
